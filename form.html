<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="desktop/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register</title>
</head>
<body>
    <div class="hane">
        <div class="header finisher-header" style="width: 100%; height: 100vh;">
    <div class="container">
        <form class="form1" action="regis">
            
            <br>
            <label for="email">Email: <i class="fa-solid fa-envelope"></i></label>
            <input type="email" id="email" name="email" required>
            <br>
            <label for="password">Password: <i class="fa-solid fa-lock"></i></label>
            <input type="password" id="password" name="password" required>
            <br>
            <p>Doesn't have an account? <a target="_parent" href="register.html">Register</a></p>
            <button type="submit"> <a href="index.html"></a> Log in</button>
        </form>
    </div>

  </div>
    <script src="finisher-header.es5.min.js" type="text/javascript"></script>
<script type="text/javascript">
new FinisherHeader({
  "count": 10,
  "size": {
    "min": 1300,
    "max": 1500,
    "pulse": 0
  },
  "speed": {
    "x": {
      "min": 0.1,
      "max": 2.6
    },
    "y": {
      "min": 0.1,
      "max": 2.3
    }
  },
  "colors": {
    "background": "#9138e5",
    "particles": [
      "#ff4848",
      "#000000",
      "#2235e5",
      "#000000",
      "#ff0000"
    ]
  },
  "blending": "overlay",
  "opacity": {
    "center": 0.5,
    "edge": 0.05
  },
  "skew": -2,
  "shapes": [
    "c",
    "t"
  ]
});
</script>
    <script src="script.js">
    </script>
    </div>
</body>
</html>
